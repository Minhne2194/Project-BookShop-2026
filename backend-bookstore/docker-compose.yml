version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: bookstore_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: bookstore_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookstore_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: